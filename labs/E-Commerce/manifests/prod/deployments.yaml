apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: ecommerce-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-deployment
  template:
    metadata:
      labels:
        app: api-deployment
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "100m"
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: db-credentials
        volumeMounts:
        - name: properties-volume
          mountPath: /app/config/
        - name: jwt
          mountPath: /etc/jwt/
      volumes:
      - name: properties-volume
        configMap:
          name: app-properties
      - name: jwt
        secret:
          secretName: jwt-keys
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: ecommerce-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-deployment
  template:
    metadata:
      labels:
        app: nginx-deployment
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 443
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "100m"
        volumeMounts:
        - name: nginx-config-volume
          mountPath: /etc/nginx/conf.d/
        - name: tls-certs-volume
          mountPath: /etc/ssl/certs/tls.crt
          subPath: tls.crt
        - name: tls-certs-volume
          mountPath: /etc/ssl/private/tls.key
          subPath: tls.key
      volumes:
      - name: nginx-config-volume
        configMap:
          name: nginx-config
      - name: tls-certs-volume
        secret:
          secretName: tls-certificates
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: ecommerce-prod
spec:
  selector:
    app: api-deployment
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: ecommerce-prod
spec:
  selector:
    app: nginx-deployment
  ports:
    - protocol: TCP
      port: 443
      targetPort: 443
  type: NodePort