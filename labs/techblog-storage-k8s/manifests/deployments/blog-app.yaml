apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-app
  namespace: techblog
spec:
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: cache-volume
          mountPath: /tmp/cache
        - name: log-volume
          mountPath: /var/log/app
        - name: upl-pvc
          mountPath: /var/www/uploads
        
        env:
          - name: UPLOAD_PATH
            value: /var/www/uploads

      
      volumes:
      - name: cache-volume
        emptyDir: {}
      - name: log-volume
        hostPath:
          path: /var/log/techblog
      - name: upl-pvc
        persistentVolumeClaim:
          claimName: uploads-pvc
